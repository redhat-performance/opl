# Get previous test results from here
history:
  # type: csv
  # file: /tmp/data.csv
  type: sd_dir
  dir: testing_sd_dir/
  matchers: |
    name: "{{ current.get('name') }}"

# Get results of test run to be compared to historical results
current:
  type: status_data
  file: /tmp/status-data.json

methods:
  - check_by_stdev_1
  - check_by_stdev_2
  - check_by_stdev_3
  - check_by_trim_stdev_1
  - check_by_trim_stdev_2
  - check_by_error_1
  - check_by_error_2
  - check_by_error_3
  - check_by_error_4
  - check_by_error_5
  - check_by_perc_20
  - check_by_perc_40
  - check_by_perc_60
  - check_by_perc_80
  - check_by_perc_100
  - check_by_min_max_0_1
  - check_by_min_max_7_1
  - check_by_min_max_7_2
  - check_by_min_max_7_3

# columns in case of CSV input
# JSON paths in case of status_data input
sets: |
  {% if current.get('parameters.cli').startswith('experiment/reg-average.py ') %}
  - results.items.avg_duration
  - results.items.passed
  - results.items.report_rc
  {% else %}
  - results.duration
  {% endif %}

  {% macro metrics(name) -%}
  {% if current.get(name + '.samples') > 0 -%}
  - {{ name }}.mean
  {%- endif %}
  {%- endmacro %}

  # System wide metrics
  {{ metrics('measurements.satellite.disk_octets.read') }}
  {{ metrics('measurements.satellite.disk_octets.write') }}
  {{ metrics('measurements.satellite.eth1.if_octets.rx') }}
  {{ metrics('measurements.satellite.eth1.if_octets.tx') }}
  {{ metrics('measurements.satellite.load.load.shortterm') }}
  {{ metrics('measurements.satellite.memory.memory-used') }}
  {{ metrics('measurements.satellite.swap.swap-used') }}

  # Satellite services
  {{ metrics('measurements.satellite.processes-httpd.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-httpd.ps_rss') }}
  {{ metrics('measurements.satellite.processes-ruby.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-ruby.ps_rss') }}
  {{ metrics('measurements.satellite.processes-dynflow.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-dynflow.ps_rss') }}
  {{ metrics('measurements.satellite.processes-pulp.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-pulp.ps_rss') }}
  {{ metrics('measurements.satellite.processes-qpidd.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-qpidd.ps_rss') }}
  {{ metrics('measurements.satellite.processes-qdrouterd.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-qdrouterd.ps_rss') }}

  # Satellite application server services
  {{ metrics('measurements.satellite.processes-puma.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-puma.ps_rss') }}
  {{ metrics('measurements.satellite.processes-Puma-Worker.ps_count.processes') }}
  {{ metrics('measurements.satellite.processes-Puma-Worker.ps_count.threads') }}
  {{ metrics('measurements.satellite.processes-Tomcat.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-Tomcat.ps_rss') }}

  # Satellite data store services
  {{ metrics('measurements.satellite.processes-postgres.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-postgres.ps_rss') }}
  {{ metrics('measurements.satellite.processes-redis.ps_cputime.user') }}
  {{ metrics('measurements.satellite.processes-redis.ps_rss') }}

  # PostgreSQL activity metrics
  {{ metrics('measurements.satellite.postgresql-candlepin.pg_n_tup_c-del') }}
  {{ metrics('measurements.satellite.postgresql-candlepin.pg_n_tup_c-ins') }}
  {{ metrics('measurements.satellite.postgresql-candlepin.pg_n_tup_c-upd') }}
  {{ metrics('measurements.satellite.postgresql-foreman.pg_n_tup_c-del') }}
  {{ metrics('measurements.satellite.postgresql-foreman.pg_n_tup_c-ins') }}
  {{ metrics('measurements.satellite.postgresql-foreman.pg_n_tup_c-upd') }}
  {{ metrics('measurements.satellite.postgresql-pulpcore.pg_n_tup_c-del') }}
  {{ metrics('measurements.satellite.postgresql-pulpcore.pg_n_tup_c-ins') }}
  {{ metrics('measurements.satellite.postgresql-pulpcore.pg_n_tup_c-upd') }}

# Shuld we log our decisions somewhere?
decisions:
  ###type: elasticsearch
  ###es_server: http://elasticsearch.intlab.perf-infra.lab.eng.rdu2.redhat.com
  ###es_index: satellite_perf_aa_decisions
  type: csv
  filename: /tmp/decisions.csv
