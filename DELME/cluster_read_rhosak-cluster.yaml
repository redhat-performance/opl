{% set namespace=MY_ENV_NAMESPACE %}

- name: measurements.openshift-monitoring.sum-container_memory_working_set_bytes
  monitoring_query: sum(container_memory_working_set_bytes{pod=~'kafka-instance-kafka-[0-9]+',namespace='{{ namespace }}',container=''})
  monitoring_step: 15

- name: measurements.openshift-monitoring.sum-pod-container_cpu_usage-sum
  monitoring_query: sum(pod:container_cpu_usage:sum{pod=~'kafka-instance-kafka-[0-9]+',namespace='{{ namespace }}'})
  monitoring_step: 15

- name: measurements.openshift-monitoring.sum-irate-container_network_receive_bytes_total
  monitoring_query: sum(irate(container_network_receive_bytes_total{pod=~'kafka-instance-kafka-[0-9]+', namespace='{{ namespace }}'}[5m]))
  monitoring_step: 15

- name: measurements.openshift-monitoring.sum-irate-container_network_transmit_bytes_total
  monitoring_query: sum(irate(container_network_transmit_bytes_total{pod=~'kafka-instance-kafka-[0-9]+', namespace='{{ namespace }}'}[5m]))
  monitoring_step: 15

- name: measurements.openshift-monitoring.sum-pod-container_fs_usage_bytes-sum
  monitoring_query: sum(pod:container_fs_usage_bytes:sum{pod=~'kafka-instance-kafka-[0-9]+',namespace='{{ namespace }}'})
  monitoring_step: 15

- name: measurements.openshift-monitoring.sum-kube_pod_container_status_restarts_total
  monitoring_query: sum(kube_pod_container_status_restarts_total{pod=~'kafka-instance-kafka-[0-9]+',namespace='{{ namespace }}'})
  monitoring_step: 15

